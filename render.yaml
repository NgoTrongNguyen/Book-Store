services:
  - type: web
    name: bookstore-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookstore-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  - type: static_site
    name: bookstore-frontend
    env: static
    buildCommand: cd frontend && npm install && npm start
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://bookstore-api.onrender.com

databases:
  - name: bookstore-db
    databaseName: bookstore
    user: bookadmin
    region: singapore