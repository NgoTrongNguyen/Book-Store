version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: book_store_db
    environment:
      POSTGRES_USER: bookadmin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bookstore_network

  backend:
    build: ./backend
    container_name: book_store_api
    environment:
      DATABASE_URL: postgresql://bookadmin:securepassword123@postgres:5432/bookstore
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - bookstore_network
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  bookstore_network:
    driver: bridge
